<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Quản lý sản phẩm</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/notifications.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html">TechStore</a>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="products.html">Sản phẩm</a></li>
                    <li class="user-only" style="display: none;"><a href="my-orders.html">Đơn hàng</a></li>
                    <li><a href="cart.html">Giỏ hàng <span id="cart-count" class="cart-count">0</span></a></li>
                    <li class="admin-only" style="display: none;"><a href="admin-products.html" class="active">QL Sản phẩm</a></li>
                    <li class="admin-only" style="display: none;"><a href="admin-orders.html">QL Đơn hàng</a></li>
                    <li class="admin-only" style="display: none;"><a href="admin-vouchers.html">QL Voucher</a></li>
                    <li class="admin-only" style="display: none;"><a href="admin-members.html">QL Thành viên</a></li>
                </ul>
            </nav>
            <div class="auth-buttons">
                <div id="user-info" style="display: none;">
                    <span id="username-display"></span>
                    <button id="logout-btn" class="btn btn-logout">Đăng xuất</button>
                </div>
                <div id="guest-buttons">
                    <a href="login.html" class="btn btn-login">Đăng nhập</a>
                    <a href="register.html" class="btn btn-register">Đăng ký</a>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">Quản lý sản phẩm</h1>

        <div class="admin-actions">
            <button class="btn btn-primary" id="add-product-btn">+ Thêm sản phẩm mới</button>
        </div>

        <div id="product-form-container" style="display: none;">
            <h2 id="form-title">Thêm sản phẩm</h2>
            <form id="product-form" class="admin-form">
                <input type="hidden" id="product-id">
                <div class="form-group">
                    <label>Tên sản phẩm</label>
                    <input type="text" id="product-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Danh mục</label>
                    <select id="product-category" class="form-control" required>
                        <option value="">Chọn danh mục</option>
                        <option value="laptop">Laptop</option>
                        <option value="monitor">Màn hình</option>
                        <option value="keyboard">Bàn phím</option>
                        <option value="mouse">Chuột</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Giá (VNĐ)</label>
                        <input type="number" id="product-price" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Tồn kho</label>
                        <input type="number" id="product-stock" class="form-control" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Mô tả</label>
                    <textarea id="product-description" class="form-control" rows="4" required></textarea>
                </div>
                <div class="form-group">
                    <label>Màu sắc (cách nhau bằng dấu phẩy)</label>
                    <input type="text" id="product-colors" class="form-control" placeholder="Đen, Trắng, Xám">
                </div>
                <div class="form-group">
                    <label>URL hình ảnh</label>
                    <input type="url" id="product-image" class="form-control" required>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submit-btn">Lưu</button>
                    <button type="button" class="btn btn-outline" id="cancel-form">Hủy</button>
                </div>
            </form>
        </div>

        <div class="admin-products-list">
            <h2>Danh sách sản phẩm</h2>
            <table class="table" id="products-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Hình ảnh</th>
                        <th>Tên</th>
                        <th>Danh mục</th>
                        <th>Giá</th>
                        <th>Tồn kho</th>
                        <th>Thao tác</th>
                    </tr>
                </thead>
                <tbody id="products-list"></tbody>
            </table>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 TechStore. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin-products.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Kiểm tra quyền admin
            if (!isAdmin()) {
                window.location.href = 'index.html';
                return;
            }
            loadAdminProducts();
            updateCartCount();
        });
    </script>
</body>
</html>
