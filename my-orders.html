<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Đơn hàng của tôi</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/notifications.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html">TechStore</a>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="products.html">Sản phẩm</a></li>
                    <li><a href="my-orders.html" class="active">Đơn hàng</a></li>
                    <li><a href="cart.html">Giỏ hàng <span id="cart-count" class="cart-count">0</span></a></li>
                    <li class="admin-only" style="display: none;"><a href="admin.html">Quản trị</a></li>
                </ul>
            </nav>
            <div class="auth-buttons">
                <div id="user-info" style="display: none;">
                    <span id="username-display"></span>
                    <button id="logout-btn" class="btn btn-logout">Đăng xuất</button>
                </div>
                <div id="guest-buttons">
                    <a href="login.html" class="btn btn-login">Đăng nhập</a>
                    <a href="register.html" class="btn btn-register">Đăng ký</a>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <h1 class="page-title">Đơn hàng của bạn</h1>

        <div id="not-login-message" class="message info" style="display: none;">
            Vui lòng <a href="login.html">đăng nhập</a> để xem đơn hàng của bạn.
        </div>

        <div class="orders-filter" id="orders-filter" style="display: none;">
            <button class="filter-btn active" data-status="all">Tất cả</button>
            <button class="filter-btn" data-status="pending">Chờ xử lý</button>
            <button class="filter-btn" data-status="processing">Đang xử lý</button>
            <button class="filter-btn" data-status="approved">Đã duyệt</button>
            <button class="filter-btn" data-status="rejected">Từ chối</button>
            <button class="filter-btn" data-status="cancelled">Đã hủy</button>
            <button class="filter-btn" data-status="completed">Hoàn thành</button>
        </div>

        <div id="user-orders-list" class="user-orders-list"></div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 TechStore. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/orders.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadUserOrders();
            updateCartCount();
        });
    </script>
</body>
</html>
