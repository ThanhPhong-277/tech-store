<!DOCTYPE html>
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sản phẩm - TechStore</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/notifications.css">
</head>
<body>

<header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html">TechStore</a>
            </div>

            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="products.html" class="active">Sản phẩm</a></li>
                    <li><a href="my-orders.html">Đơn hàng</a></li>
                    <li><a href="cart.html">Giỏ hàng <span id="cart-count" class="cart-count">0</span></a></li>
                    <li class="admin-only" style="display: none;"><a href="admin.html">Quản trị</a></li>
                </ul>
            </nav>
            <div class="auth-buttons">
                <div id="user-info" style="display: none;">
                    <span id="username-display"></span>
                    <button id="logout-btn" class="btn btn-logout">Đăng xuất</button>
                </div>
                <div id="guest-buttons">
                    <a href="login.html" class="btn btn-login">Đăng nhập</a>
                    <a href="register.html" class="btn btn-register">Đăng ký</a>
                </div>
            </div>
        </div>

    </header>
    <main class="container">
        <div class="row">
            <h1 class="page-title">Tất cả sản phẩm</h1>

            <!-- Bộ lọc danh mục -->

            <div class="category-filter">
                <button class="filter-btn active" data-category="all">Tất cả</button>
                <button class="filter-btn" data-category="laptop">Laptop</button>
                <button class="filter-btn" data-category="monitor">Màn hình</button>
                <button class="filter-btn" data-category="keyboard">Bàn phím</button>
                <button class="filter-btn" data-category="mouse">Chuột</button>
            </div>

            <!-- Grid sản phẩm -->

            <div class="product-grid" id="product-grid"></div>
            <div id="no-products" class="no-products" style="display: none;">Không tìm thấy sản phẩm.</div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 TechStore. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/data.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/products.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadAllProducts();
            updateCartCount();
        });
    </script>
</body>
</html>
